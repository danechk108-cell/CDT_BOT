<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>CODE T</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
/* ══════════════════════════════════════════════════
   RESET & TOKENS
══════════════════════════════════════════════════ */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --void:#03040e;
  --surface:#090b1a;
  --surface2:#0d1024;
  --surface3:#111428;
  --glass:rgba(255,255,255,0.035);
  --glass2:rgba(255,255,255,0.065);
  --glass3:rgba(255,255,255,0.10);
  --border:rgba(255,255,255,0.065);
  --border2:rgba(255,255,255,0.11);
  --border3:rgba(255,255,255,0.18);
  --iris:#7c5ef9;
  --iris2:#5a3fd4;
  --iris3:#9f82ff;
  --plasma:#be74ff;
  --plasma2:#d49aff;
  --nova:#f7cb45;
  --nova2:#ffaa00;
  --mint:#26e89a;
  --mint2:#00c97a;
  --red:#ff4060;
  --cyan:#00e5ff;
  --text:#eceef8;
  --text2:#c5c8e0;
  --muted:#3e4468;
  --muted2:#6a729a;
  --muted3:#8890b8;
  --r:16px;
  --r2:22px;
  --r3:28px;
  --shadow-iris:0 8px 40px rgba(124,94,249,.35);
  --shadow-nova:0 8px 40px rgba(247,203,69,.3);
  --shadow-mint:0 8px 40px rgba(38,232,154,.3);
}

html,body{
  height:100%;background:var(--void);color:var(--text);
  font-family:'Inter',sans-serif;overflow:hidden;font-size:14px;
  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
}

/* ══════════════════════════════════════════════════
   ANIMATED BACKGROUND
══════════════════════════════════════════════════ */
#bg-canvas{
  position:fixed;inset:0;pointer-events:none;z-index:0;
}
#ambient{
  position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;
}
.amb-orb{
  position:absolute;border-radius:50%;filter:blur(90px);
  animation:orbFloat 10s ease-in-out infinite;
}
.amb-1{
  width:380px;height:380px;
  background:radial-gradient(circle, rgba(124,94,249,.22) 0%, transparent 70%);
  top:-120px;left:-100px;animation-delay:0s;
}
.amb-2{
  width:320px;height:320px;
  background:radial-gradient(circle, rgba(190,116,255,.18) 0%, transparent 70%);
  bottom:-100px;right:-80px;animation-delay:-5s;
}
.amb-3{
  width:220px;height:220px;
  background:radial-gradient(circle, rgba(247,203,69,.12) 0%, transparent 70%);
  top:35%;left:55%;animation-delay:-2.5s;
}
.amb-4{
  width:160px;height:160px;
  background:radial-gradient(circle, rgba(0,229,255,.10) 0%, transparent 70%);
  top:60%;left:10%;animation-delay:-7s;
}

@keyframes orbFloat{
  0%,100%{transform:translate(0,0) scale(1)}
  25%{transform:translate(18px,-24px) scale(1.04)}
  50%{transform:translate(-10px,16px) scale(.96)}
  75%{transform:translate(24px,10px) scale(1.02)}
}

/* Grid overlay for sci-fi feel */
.bg-grid{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:
    linear-gradient(rgba(124,94,249,.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(124,94,249,.04) 1px, transparent 1px);
  background-size:40px 40px;
  mask-image:radial-gradient(ellipse 80% 80% at 50% 50%, black 0%, transparent 100%);
}

/* ══════════════════════════════════════════════════
   APP STRUCTURE
══════════════════════════════════════════════════ */
#app{
  position:relative;z-index:1;
  display:flex;flex-direction:column;height:100vh;height:100dvh;overflow:hidden;
}

/* ══════════════════════════════════════════════════
   HEADER
══════════════════════════════════════════════════ */
#header{
  flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;
  background:rgba(3,4,14,.75);
  backdrop-filter:blur(24px) saturate(1.5);
  -webkit-backdrop-filter:blur(24px) saturate(1.5);
  border-bottom:1px solid rgba(124,94,249,.12);
  position:relative;
}
#header::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg, transparent, rgba(124,94,249,.4), rgba(190,116,255,.4), transparent);
}

.logo{
  display:flex;align-items:center;gap:10px;
  font-family:'Syne',sans-serif;
  font-weight:800;font-size:18px;letter-spacing:4px;color:#fff;
}
.logo-mark{
  width:32px;height:32px;
  background:linear-gradient(135deg,var(--iris),var(--plasma));
  border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 24px rgba(124,94,249,.55), 0 0 4px rgba(124,94,249,.3) inset;
  position:relative;
  flex-shrink:0;
}
.logo-mark::before{
  content:'';position:absolute;inset:-1px;border-radius:11px;
  background:linear-gradient(135deg,rgba(255,255,255,.25),transparent);
}
.logo-mark svg{width:17px;height:17px;fill:#fff;position:relative;z-index:1}

.logo-text{
  background:linear-gradient(135deg,#fff 40%,var(--iris3) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}

.hdr-bal{
  display:flex;align-items:center;gap:6px;
  background:linear-gradient(135deg,rgba(247,203,69,.1),rgba(247,203,69,.05));
  border:1px solid rgba(247,203,69,.22);
  border-radius:22px;
  padding:7px 14px 7px 10px;
  font-family:'Space Grotesk',sans-serif;
  font-size:14px;font-weight:700;color:var(--nova);
  backdrop-filter:blur(8px);
  box-shadow:0 2px 12px rgba(247,203,69,.1);
  transition:box-shadow .3s;
}
.hdr-bal:hover{box-shadow:0 4px 20px rgba(247,203,69,.25)}
.hdr-bal svg{width:14px;height:14px;stroke:var(--nova);stroke-width:1.8;fill:none;stroke-linecap:round;flex-shrink:0}

/* ══════════════════════════════════════════════════
   PAGES
══════════════════════════════════════════════════ */
#pages{flex:1;position:relative;overflow:hidden}
.page{
  position:absolute;inset:0;overflow-y:auto;
  padding-bottom:100px;
  opacity:0;pointer-events:none;
  transform:translateY(14px);
  transition:opacity .25s cubic-bezier(.4,0,.2,1),transform .25s cubic-bezier(.4,0,.2,1);
}
.page.active{opacity:1;pointer-events:all;transform:translateY(0)}

.page::-webkit-scrollbar{width:2px}
.page::-webkit-scrollbar-track{background:transparent}
.page::-webkit-scrollbar-thumb{background:rgba(124,94,249,.3);border-radius:2px}

/* ══════════════════════════════════════════════════
   NAVBAR — FLOATING PILL
══════════════════════════════════════════════════ */
#navbar{
  flex-shrink:0;
  background:rgba(9,11,26,.88);
  backdrop-filter:blur(24px) saturate(1.6);
  -webkit-backdrop-filter:blur(24px) saturate(1.6);
  border-top:1px solid rgba(255,255,255,.07);
  padding:8px 8px calc(8px + env(safe-area-inset-bottom,0));
  display:flex;align-items:center;justify-content:space-around;
  position:relative;
}
#navbar::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg, transparent, rgba(124,94,249,.3), rgba(190,116,255,.3), transparent);
}

.nav-item{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  cursor:pointer;color:var(--muted2);
  font-size:9px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;
  padding:6px 10px;border-radius:14px;
  transition:color .2s,background .25s;
  border:none;background:none;font-family:'Space Grotesk',sans-serif;
  position:relative;flex:1;
}
.nav-item svg{
  width:20px;height:20px;stroke:currentColor;fill:none;
  stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;
  transition:stroke .2s, transform .2s, filter .2s;
}
.nav-item.active{color:var(--iris3);background:rgba(124,94,249,.1)}
.nav-item.active svg{
  stroke:var(--iris3);
  filter:drop-shadow(0 0 6px rgba(124,94,249,.7));
  transform:scale(1.08) translateY(-1px);
}

/* ROULETTE CENTER BUTTON */
.nav-spin{
  flex:0 0 auto;
  display:flex;flex-direction:column;align-items:center;gap:3px;
  cursor:pointer;color:var(--text2);
  font-size:9px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;
  border:none;background:none;font-family:'Space Grotesk',sans-serif;
  position:relative;
}
.nav-spin-disc{
  width:54px;height:54px;
  background:linear-gradient(135deg,var(--iris),var(--plasma));
  border-radius:18px;
  display:flex;align-items:center;justify-content:center;
  animation:spinPulse 3s ease-in-out infinite;
  margin-top:-18px;
  transition:transform .15s;
  box-shadow:var(--shadow-iris);
  position:relative;overflow:hidden;
}
.nav-spin-disc::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.2),transparent 60%);
  border-radius:18px;
}
.nav-spin-disc svg{width:24px;height:24px;stroke:#fff;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;position:relative;z-index:1}
.nav-spin-disc:active{transform:scale(.91)}
.nav-spin.active .nav-spin-disc{
  background:linear-gradient(135deg,var(--plasma),var(--iris));
  box-shadow:0 8px 48px rgba(190,116,255,.55);
}

@keyframes spinPulse{
  0%,100%{box-shadow:var(--shadow-iris)}
  50%{box-shadow:0 8px 52px rgba(124,94,249,.65), 0 0 0 8px rgba(124,94,249,.08)}
}

/* ══════════════════════════════════════════════════
   GLASS CARDS
══════════════════════════════════════════════════ */
.glass-card{
  background:var(--glass);
  border:1px solid var(--border);
  border-radius:var(--r2);
  backdrop-filter:blur(16px);
  position:relative;overflow:hidden;
}
.glass-card::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.05),rgba(255,255,255,0));
  pointer-events:none;
}

/* ══════════════════════════════════════════════════
   INFO / HOME PAGE
══════════════════════════════════════════════════ */
#page-info{padding-top:0}

.hero-section{
  padding:20px 16px 16px;
  position:relative;
}

.hero-greeting{
  font-size:10px;color:var(--muted3);text-transform:uppercase;
  letter-spacing:2px;font-weight:700;margin-bottom:4px;
  font-family:'Space Grotesk',sans-serif;
}
.hero-name{
  font-family:'Syne',sans-serif;
  font-size:28px;font-weight:800;
  background:linear-gradient(135deg,#fff 20%,var(--iris3) 80%,var(--plasma2) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:16px;line-height:1.1;
}

/* BALANCE CARD — holographic */
.balance-card{
  background:linear-gradient(135deg,
    rgba(124,94,249,.18) 0%,
    rgba(190,116,255,.08) 50%,
    rgba(124,94,249,.05) 100%
  );
  border:1px solid rgba(124,94,249,.28);
  border-radius:var(--r2);
  padding:18px 18px;
  margin-bottom:10px;
  position:relative;overflow:hidden;
  display:flex;align-items:center;justify-content:space-between;
}
.balance-card::before{
  content:'';position:absolute;top:-60px;right:-60px;
  width:200px;height:200px;
  background:radial-gradient(circle, rgba(190,116,255,.18) 0%, transparent 65%);
  pointer-events:none;
}
.balance-card::after{
  content:'';
  position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.06) 0%,transparent 50%);
  pointer-events:none;
  border-radius:inherit;
}
/* shimmer sweep */
.balance-card .shimmer{
  position:absolute;inset:0;
  background:linear-gradient(105deg, transparent 40%, rgba(255,255,255,.06) 50%, transparent 60%);
  animation:shimmerSweep 4s ease-in-out infinite;
  border-radius:inherit;
}
@keyframes shimmerSweep{
  0%{transform:translateX(-100%)}
  60%,100%{transform:translateX(200%)}
}

.bc-left{position:relative;z-index:1}
.bc-label{
  font-size:10px;color:rgba(255,255,255,.45);
  text-transform:uppercase;letter-spacing:1.5px;font-weight:700;
  font-family:'Space Grotesk',sans-serif;margin-bottom:5px;
}
.bc-amount{
  font-family:'Syne',sans-serif;
  font-size:38px;font-weight:800;color:var(--nova);
  line-height:1;
  text-shadow:0 0 40px rgba(247,203,69,.35);
}
.bc-amount span{font-size:20px;opacity:.65;margin-left:2px;font-family:'Space Grotesk',sans-serif}
.bc-right{position:relative;z-index:1}
.bc-icon{
  width:56px;height:56px;
  background:rgba(124,94,249,.15);
  border:1px solid rgba(124,94,249,.28);
  border-radius:18px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 20px rgba(124,94,249,.2);
}
.bc-icon svg{width:26px;height:26px;stroke:var(--iris3);stroke-width:1.7;fill:none;stroke-linecap:round;stroke-linejoin:round}

/* MINI STATS ROW */
.mini-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.ms-card{
  background:var(--glass);border:1px solid var(--border);
  border-radius:var(--r);padding:13px 11px;
  display:flex;flex-direction:column;gap:7px;
  position:relative;overflow:hidden;
  transition:border-color .25s, background .25s;
}
.ms-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  border-radius:2px 2px 0 0;
}
.ms-card.c-spin::before{background:linear-gradient(90deg,var(--iris),var(--plasma))}
.ms-card.c-win::before{background:linear-gradient(90deg,var(--mint),var(--cyan))}
.ms-card.c-best::before{background:linear-gradient(90deg,var(--nova),var(--nova2))}

.ms-card::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(180deg,rgba(255,255,255,.03) 0%,transparent 60%);
  pointer-events:none;
}

.ms-icon{
  width:28px;height:28px;border-radius:9px;
  background:var(--glass2);
  display:flex;align-items:center;justify-content:center;
}
.ms-icon svg{width:14px;height:14px;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
.c-spin .ms-icon svg{stroke:var(--iris3);filter:drop-shadow(0 0 4px rgba(124,94,249,.5))}
.c-win .ms-icon svg{stroke:var(--mint);filter:drop-shadow(0 0 4px rgba(38,232,154,.5))}
.c-best .ms-icon svg{stroke:var(--nova);filter:drop-shadow(0 0 4px rgba(247,203,69,.5))}
.ms-val{
  font-family:'Syne',sans-serif;
  font-size:20px;font-weight:800;line-height:1;
}
.c-spin .ms-val{color:var(--iris3)}
.c-win .ms-val{color:var(--mint)}
.c-best .ms-val{color:var(--nova)}
.ms-label{font-size:9px;color:var(--muted3);text-transform:uppercase;letter-spacing:.8px;font-weight:700;font-family:'Space Grotesk',sans-serif}

/* SECTION */
.section{padding:0 16px;margin-bottom:14px}
.section-hdr{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:10px;
}
.section-title{
  font-family:'Space Grotesk',sans-serif;
  font-size:11px;font-weight:700;text-transform:uppercase;
  letter-spacing:1.8px;color:var(--muted3);
  display:flex;align-items:center;gap:7px;
}
.section-title svg{width:13px;height:13px;stroke:var(--iris3);stroke-width:2.2;fill:none;stroke-linecap:round;filter:drop-shadow(0 0 4px rgba(124,94,249,.5))}
.count-pill{
  background:rgba(124,94,249,.14);
  border:1px solid rgba(124,94,249,.24);
  color:var(--iris3);
  font-size:10px;font-weight:700;
  padding:3px 9px;border-radius:20px;
  font-family:'Space Grotesk',sans-serif;
}

/* PRIZE ROWS */
.prize-item{
  background:var(--glass);border:1px solid var(--border);
  border-radius:var(--r);
  display:flex;align-items:center;gap:12px;
  padding:12px 13px;
  margin-bottom:7px;
  transition:border-color .2s,background .2s,transform .15s;
  animation:slideUp .35s cubic-bezier(.4,0,.2,1) both;
  position:relative;overflow:hidden;
}
.prize-item::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.025),transparent);
  pointer-events:none;
}
.prize-item:active{background:var(--glass2);border-color:var(--border2);transform:scale(.99)}
@keyframes slideUp{
  from{opacity:0;transform:translateY(14px)}
  to{opacity:1;transform:translateY(0)}
}
.pi-icon{
  width:42px;height:42px;border-radius:13px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.pi-icon.bal{background:rgba(247,203,69,.09);border:1px solid rgba(247,203,69,.2)}
.pi-icon.acc{background:rgba(124,94,249,.09);border:1px solid rgba(124,94,249,.2)}
.pi-icon.gld{background:rgba(247,203,69,.14);border:1px solid rgba(247,203,69,.28)}
.pi-icon svg{width:20px;height:20px;stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round}
.pi-icon.bal svg{stroke:var(--nova)}
.pi-icon.acc svg{stroke:var(--iris3)}
.pi-icon.gld svg{stroke:var(--nova)}
.pi-body{flex:1;min-width:0}
.pi-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px;font-family:'Space Grotesk',sans-serif}
.pi-meta{display:flex;align-items:center;gap:5px}
.pi-date{font-size:10px;color:var(--muted2)}
.pi-type-tag{
  font-size:8px;font-weight:800;letter-spacing:.8px;text-transform:uppercase;
  padding:2px 6px;border-radius:4px;
  background:rgba(124,94,249,.1);color:var(--iris3);border:1px solid rgba(124,94,249,.2);
  font-family:'Space Grotesk',sans-serif;
}
.pi-status{
  font-size:9px;font-weight:800;letter-spacing:.6px;
  display:flex;align-items:center;gap:4px;
  flex-shrink:0;font-family:'Space Grotesk',sans-serif;
}
.pi-status.active{color:var(--mint)}
.pi-status.done{color:var(--muted2)}
.status-dot{
  width:5px;height:5px;border-radius:50%;
  background:currentColor;
  animation:dotBlink 2s ease-in-out infinite;
}
.pi-status.done .status-dot{animation:none}
@keyframes dotBlink{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.8)}}

/* ══════════════════════════════════════════════════
   ROULETTE PAGE
══════════════════════════════════════════════════ */
#page-roulette{padding-top:16px}
.rt-header{
  padding:0 16px 14px;
  font-family:'Space Grotesk',sans-serif;
  font-size:10px;font-weight:700;color:var(--muted3);
  text-transform:uppercase;letter-spacing:2px;
}
.rt-grid{display:flex;flex-direction:column;gap:9px;padding:0 16px}

.rt-card{
  background:var(--glass);border:1px solid var(--border);
  border-radius:22px;
  padding:15px 14px;
  display:flex;align-items:center;gap:13px;
  cursor:pointer;
  transition:border-color .25s,background .25s,transform .15s,box-shadow .25s;
  position:relative;overflow:hidden;
}
.rt-card::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.04),transparent 60%);
  pointer-events:none;
}
.rt-card:active{transform:scale(.98)}

/* Shimmering border on hover/selected */
.rt-orb{
  position:absolute;inset:-1px;border-radius:23px;
  border:2px solid transparent;
  background:linear-gradient(var(--surface),var(--surface)) padding-box,
              linear-gradient(135deg,var(--iris),var(--plasma)) border-box;
  opacity:0;transition:opacity .3s;pointer-events:none;
}
.rt-card.sel .rt-orb{opacity:1}
.rt-card.sel{
  border-color:transparent;
  background:rgba(124,94,249,.07);
  box-shadow:0 4px 30px rgba(124,94,249,.2);
}

.rt-ico{
  width:50px;height:50px;border-radius:16px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;position:relative;z-index:1;
}
.rt-ico.day{
  background:linear-gradient(135deg,rgba(124,94,249,.22),rgba(124,94,249,.06));
  border:1px solid rgba(124,94,249,.28);
  box-shadow:0 4px 16px rgba(124,94,249,.15);
}
.rt-ico.three{
  background:linear-gradient(135deg,rgba(38,232,154,.18),rgba(38,232,154,.04));
  border:1px solid rgba(38,232,154,.22);
  box-shadow:0 4px 16px rgba(38,232,154,.12);
}
.rt-ico.week{
  background:linear-gradient(135deg,rgba(247,203,69,.18),rgba(247,203,69,.04));
  border:1px solid rgba(247,203,69,.22);
  box-shadow:0 4px 16px rgba(247,203,69,.12);
}
.rt-ico.paid{
  background:linear-gradient(135deg,rgba(190,116,255,.22),rgba(190,116,255,.06));

.rt-ico svg{width:24px;height:24px;stroke-width:1.7;fill:none;stroke-linecap:round;stroke-linejoin:round}
.rt-ico.day svg{stroke:var(--iris3)}
.rt-ico.three svg{stroke:var(--mint)}
.rt-ico.week svg{stroke:var(--nova)}

.rt-info{flex:1;min-width:0;position:relative;z-index:1}
.rt-name{

}
.rt-sub{font-size:11px;color:var(--muted3)}
.rt-right{text-align:right;flex-shrink:0;position:relative;z-index:1}

.status-badge{

}
.sb-ready{background:rgba(38,232,154,.1);border:1px solid rgba(38,232,154,.22);color:var(--mint)}
.sb-wait{background:rgba(247,203,69,.08);border:1px solid rgba(247,203,69,.18);color:var(--nova)}
.sb-cond{background:rgba(124,94,249,.1);border:1px solid rgba(124,94,249,.2);color:var(--iris3)}
.sb-paid{background:rgba(190,116,255,.1);border:1px solid rgba(190,116,255,.2);color:var(--plasma2)}

/* ══════════════════════════════════════════════════
   LEADERS PAGE
══════════════════════════════════════════════════ */
#page-leaders{padding-top:16px}
.ldrs-header{
  padding:0 16px 14px;

}
.ldrs-list{padding:0 16px}

.ldr-card{

.ldr-card::before{

}
.ldr-card.me::after{

}
.ldr-rank{

  font-size:13px;font-weight:800;width:26px;text-align:center;flex-shrink:0;
}
.ldr-rank svg{width:20px;height:20px;fill:none;stroke-width:1.7;stroke-linecap:round}
.r1 svg{stroke:var(--nova);filter:drop-shadow(0 0 5px rgba(247,203,69,.7))}
.r2 svg{stroke:#c4c4c4;filter:drop-shadow(0 0 4px rgba(196,196,196,.5))}
.r3 svg{stroke:#d4956a;filter:drop-shadow(0 0 4px rgba(212,149,106,.5))}
.rn{color:var(--muted2);font-size:12px;font-family:'Space Grotesk',sans-serif}

.ldr-av{

  font-family:'Syne',sans-serif;
  font-size:15px;font-weight:800;flex-shrink:0;

}
.ldr-body{flex:1;min-width:0}
.ldr-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:'Space Grotesk',sans-serif}
.ldr-id{font-size:10px;color:var(--muted2);margin-top:2px;display:flex;align-items:center;gap:4px;font-family:'Space Grotesk',sans-serif}
.ldr-id svg{width:11px;height:11px;stroke:var(--muted2);stroke-width:2;fill:none;stroke-linecap:round}
.ldr-bal{
  font-family:'Syne',sans-serif;
  font-size:15px;font-weight:800;color:var(--nova);flex-shrink:0;
  text-shadow:0 0 20px rgba(247,203,69,.3);
}

/* ══════════════════════════════════════════════════
   PROFILE PAGE
══════════════════════════════════════════════════ */
#page-profile{padding-top:0}

.prof-hero{
  padding:24px 16px 18px;
  background:linear-gradient(180deg,rgba(124,94,249,.1) 0%,transparent 100%);
  border-bottom:1px solid var(--border);
  text-align:center;position:relative;
}
.prof-hero::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg, transparent, rgba(124,94,249,.25), transparent);
}
.prof-av-wrap{
  position:relative;width:84px;height:84px;margin:0 auto 14px;
}
.prof-av{
  width:84px;height:84px;border-radius:50%;
  background:linear-gradient(135deg,var(--iris),var(--plasma));
  display:flex;align-items:center;justify-content:center;
  font-family:'Syne',sans-serif;
  font-size:34px;font-weight:800;color:#fff;
  position:relative;z-index:1;
  box-shadow:0 0 0 3px rgba(124,94,249,.28), 0 0 40px rgba(124,94,249,.3);
}
.prof-av-ring{
  position:absolute;inset:-8px;border-radius:50%;
  border:2px solid transparent;
  background:linear-gradient(var(--void),var(--void)) padding-box,
              conic-gradient(from 0deg, var(--iris), var(--plasma), var(--cyan), var(--iris)) border-box;
  animation:ringRotate 5s linear infinite;
}
@keyframes ringRotate{to{transform:rotate(360deg)}}

.prof-name{
  font-family:'Syne',sans-serif;
  font-size:20px;font-weight:800;margin-bottom:3px;
  background:linear-gradient(135deg,#fff,var(--text2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.prof-user{font-size:12px;color:var(--muted2);margin-bottom:12px;font-family:'Space Grotesk',sans-serif}
.prof-bal-row{
  display:inline-flex;align-items:baseline;gap:4px;
  background:linear-gradient(135deg,rgba(247,203,69,.1),rgba(247,203,69,.05));
  border:1px solid rgba(247,203,69,.22);
  border-radius:14px;padding:8px 20px;
}
.prof-bal-num{
  font-family:'Syne',sans-serif;
  font-size:30px;font-weight:800;color:var(--nova);
  text-shadow:0 0 30px rgba(247,203,69,.3);
}
.prof-bal-cur{font-size:16px;color:rgba(247,203,69,.55);font-weight:700;font-family:'Space Grotesk',sans-serif}

.prof-stats-row{
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:1px;background:var(--border);
  margin:14px 16px;border-radius:18px;overflow:hidden;
}
.psr-box{
  background:var(--surface2);padding:13px 8px;text-align:center;
  position:relative;
}
.psr-box::before{
  content:'';position:absolute;top:0;left:10%;right:10%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(124,94,249,.2),transparent);
}
.psr-val{
  font-family:'Syne',sans-serif;
  font-size:18px;font-weight:800;
  background:linear-gradient(135deg,#fff,var(--text2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.psr-label{font-size:9px;color:var(--muted2);text-transform:uppercase;letter-spacing:.8px;margin-top:3px;font-weight:700;font-family:'Space Grotesk',sans-serif}

.prof-menu{margin:0 16px}
.pm-card{
  background:var(--glass);border:1px solid var(--border);
  border-radius:20px;overflow:hidden;
}
.pm-row{
  display:flex;align-items:center;gap:13px;
  padding:14px 15px;
  border-bottom:1px solid var(--border);
  cursor:pointer;
  transition:background .15s;
  position:relative;
}
.pm-row:last-child{border-bottom:none}
.pm-row:active{background:var(--glass2)}
.pm-row::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.02),transparent);
  pointer-events:none;
}
.pm-icon{
  width:38px;height:38px;border-radius:12px;
  background:var(--glass2);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.pm-icon svg{width:17px;height:17px;stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round}
.pm-icon.i-game{background:rgba(124,94,249,.1);border:1px solid rgba(124,94,249,.2)}
.pm-icon.i-game svg{stroke:var(--iris3)}
.pm-icon.i-prize{background:rgba(247,203,69,.1);border:1px solid rgba(247,203,69,.2)}
.pm-icon.i-prize svg{stroke:var(--nova)}
.pm-icon.i-date{background:rgba(38,232,154,.1);border:1px solid rgba(38,232,154,.2)}
.pm-icon.i-date svg{stroke:var(--mint)}
.pm-texts{flex:1;min-width:0}
.pm-label{font-size:10px;color:var(--muted2);font-weight:600;margin-bottom:2px;font-family:'Space Grotesk',sans-serif;letter-spacing:.3px;text-transform:uppercase}
.pm-val{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px;font-family:'Space Grotesk',sans-serif}
.pm-chevron{
  width:20px;height:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0;
  color:var(--muted);
}
.pm-chevron svg{width:16px;height:16px;stroke:var(--muted);stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}

/* ══════════════════════════════════════════════════
   BUTTONS
══════════════════════════════════════════════════ */
.btn{
  border:none;border-radius:14px;
  padding:13px 20px;
  font-size:14px;font-weight:700;
  cursor:pointer;
  transition:opacity .15s,transform .1s,box-shadow .2s;
  font-family:'Space Grotesk',sans-serif;
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  position:relative;overflow:hidden;
}
.btn::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.12),transparent 60%);
  pointer-events:none;
}
.btn:active{transform:scale(.95)}
.btn svg{width:15px;height:15px;stroke:currentColor;stroke-width:2.2;fill:none;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.btn-primary{
  background:linear-gradient(135deg,var(--iris),var(--iris2));
  color:#fff;
  box-shadow:var(--shadow-iris);
}
.btn-primary:hover{box-shadow:0 8px 36px rgba(124,94,249,.5)}
.btn-primary:disabled{opacity:.35;cursor:not-allowed;box-shadow:none}
.btn-secondary{
  background:var(--glass2);color:var(--text);
  border:1px solid var(--border2);
}
.btn-danger{
  background:rgba(255,64,96,.12);color:var(--red);
  border:1px solid rgba(255,64,96,.25);
}
.btn-full{width:100%;display:flex}
.btn-sm{padding:8px 14px;font-size:12px;border-radius:11px}

/* ══════════════════════════════════════════════════
   MODAL SHEET
══════════════════════════════════════════════════ */
#modal-bg{
  display:none;position:fixed;inset:0;
  background:rgba(3,4,14,.80);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  z-index:200;align-items:flex-end;
}
#modal-bg.open{display:flex;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

.modal-sheet{
  width:100%;
  background:var(--surface2);
  border:1px solid var(--border2);
  border-bottom:none;
  border-radius:26px 26px 0 0;
  padding:20px;
  padding-bottom:calc(20px + env(safe-area-inset-bottom,0));
  max-height:90vh;overflow-y:auto;
  animation:sheetUp .28s cubic-bezier(.25,.46,.45,.94);
  position:relative;
}
.modal-sheet::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(124,94,249,.35),rgba(190,116,255,.35),transparent);
}
@keyframes sheetUp{from{transform:translateY(100%)}to{transform:translateY(0)}}

.modal-handle{
  width:38px;height:4px;border-radius:2px;
  background:var(--border3);margin:0 auto 18px;
}
.modal-title{
  font-family:'Syne',sans-serif;
  font-size:18px;font-weight:800;margin-bottom:14px;
  display:flex;align-items:center;gap:8px;
}
.modal-title-icon{
  width:32px;height:32px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  background:rgba(124,94,249,.15);border:1px solid rgba(124,94,249,.25);
  flex-shrink:0;
}
.modal-title-icon svg{width:16px;height:16px;stroke:var(--iris3);stroke-width:2;fill:none;stroke-linecap:round}
.modal-info{
  font-size:13px;color:var(--muted3);line-height:1.75;margin-bottom:11px;
  font-family:'Space Grotesk',sans-serif;
}
.modal-info a{color:var(--iris3);text-decoration:none;font-weight:600}
.modal-input{
  width:100%;
  background:rgba(255,255,255,.04);
  border:1px solid var(--border2);
  border-radius:13px;padding:13px 16px;
  font-size:15px;color:var(--text);
  font-family:'Space Grotesk',sans-serif;
  outline:none;
  transition:border-color .2s,box-shadow .2s;
}
.modal-input:focus{
  border-color:rgba(124,94,249,.55);
  box-shadow:0 0 0 3px rgba(124,94,249,.12);
}
.modal-footer{display:flex;gap:8px;margin-top:16px}
.modal-prize-val{
  font-family:'Syne',sans-serif;
  font-size:34px;font-weight:800;color:var(--nova);
  margin:10px 0;text-shadow:0 0 30px rgba(247,203,69,.35);
}
.modal-code-box{
  background:rgba(0,0,0,.35);
  border:1px solid var(--border2);
  border-radius:13px;padding:14px;
  font-family:'Space Grotesk',monospace;font-size:13px;
  color:var(--nova);word-break:break-all;
  line-height:1.7;margin:10px 0;
}

/* CONDITIONS */
.cond-row{
  display:flex;align-items:center;gap:11px;
  padding:11px 0;
  border-bottom:1px solid var(--border);
}
.cond-row:last-of-type{border-bottom:none}
.cond-check{
  width:24px;height:24px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.cond-check.ok{background:rgba(38,232,154,.14);border:1px solid rgba(38,232,154,.28)}
.cond-check.no{background:rgba(255,255,255,.04);border:1px solid var(--border2)}
.cond-check svg{width:12px;height:12px;stroke-width:2.5;fill:none;stroke-linecap:round;stroke-linejoin:round}
.cond-check.ok svg{stroke:var(--mint)}
.cond-check.no svg{stroke:var(--muted)}
.cond-text{flex:1;font-size:13px;font-weight:500;font-family:'Space Grotesk',sans-serif}
.cond-link{
  font-size:11px;color:var(--iris3);font-weight:700;
  text-decoration:none;
  padding:5px 10px;border-radius:9px;
  background:rgba(124,94,249,.1);border:1px solid rgba(124,94,249,.22);
  white-space:nowrap;font-family:'Space Grotesk',sans-serif;
  transition:background .2s;
}
.cond-link:active{background:rgba(124,94,249,.2)}

.prizes-text{
  font-size:12px;color:var(--muted2);line-height:2;
  padding:10px 12px;
  background:rgba(0,0,0,.2);
  border-radius:11px;
  font-family:'Space Grotesk',sans-serif;
}
.prizes-text div{display:flex;align-items:center;gap:8px;padding:1px 0}
.pt-dot{width:5px;height:5px;border-radius:50%;background:var(--iris3);flex-shrink:0}
.pt-name{flex:1}
.pt-pct{color:var(--muted2);font-size:11px;font-variant-numeric:tabular-nums}

/* ══════════════════════════════════════════════════
   SPIN OVERLAY — cinematic
══════════════════════════════════════════════════ */
#spin-overlay{
  display:none;position:fixed;inset:0;
  background:radial-gradient(ellipse at 50% 50%, rgba(20,14,50,.97) 0%, rgba(3,4,14,.99) 100%);
  z-index:300;
  flex-direction:column;align-items:center;justify-content:center;gap:28px;
}
#spin-overlay.on{display:flex}
.so-disc-wrap{position:relative;width:150px;height:150px}
.so-disc{
  width:150px;height:150px;border-radius:50%;
  border:3px solid transparent;
  background:linear-gradient(var(--void),var(--void)) padding-box,
              conic-gradient(from 0deg, var(--iris), var(--plasma), var(--cyan), var(--iris)) border-box;
  animation:discSpin 1.1s linear infinite;
}
@keyframes discSpin{to{transform:rotate(360deg)}}
.so-disc-glow{
  position:absolute;inset:-20px;border-radius:50%;
  background:radial-gradient(circle, rgba(124,94,249,.12) 0%, transparent 65%);
  animation:discSpin 1.1s linear infinite reverse;
}
.so-center{
  position:absolute;inset:22px;border-radius:50%;
  background:linear-gradient(135deg,rgba(124,94,249,.2),rgba(190,116,255,.1));
  border:1px solid rgba(124,94,249,.3);
  display:flex;align-items:center;justify-content:center;
}
.so-center svg{width:42px;height:42px;stroke:var(--iris3);stroke-width:1.5;fill:none;stroke-linecap:round;animation:spinGlow 2s ease-in-out infinite alternate}
@keyframes spinGlow{
  from{opacity:.5;filter:drop-shadow(0 0 4px var(--iris))}
  to{opacity:1;filter:drop-shadow(0 0 16px var(--iris))}
}
.so-text{
  font-family:'Syne',sans-serif;
  font-size:18px;font-weight:800;
  background:linear-gradient(135deg,#fff,var(--iris3));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:breathe 1s ease-in-out infinite alternate;
}
@keyframes breathe{from{opacity:.5}to{opacity:1}}

/* ══════════════════════════════════════════════════
   PRIZE OVERLAY
══════════════════════════════════════════════════ */
#prize-overlay{
  display:none;position:fixed;inset:0;
  background:radial-gradient(ellipse at 50% 40%, rgba(20,14,50,.97) 0%, rgba(3,4,14,.99) 100%);
  z-index:300;
  flex-direction:column;align-items:center;justify-content:center;
  padding:28px;gap:0;
}
#prize-overlay.on{display:flex}
#confetti-field{position:absolute;inset:0;pointer-events:none;overflow:hidden}

.po-badge{
  font-size:10px;font-weight:800;letter-spacing:2px;text-transform:uppercase;
  color:var(--iris3);margin-bottom:20px;
  font-family:'Space Grotesk',sans-serif;
  animation:fadeUp .4s ease both;
  padding:5px 14px;
  border:1px solid rgba(124,94,249,.25);
  background:rgba(124,94,249,.1);
  border-radius:20px;
}
.po-icon-wrap{
  width:100px;height:100px;border-radius:50%;
  background:linear-gradient(135deg,rgba(124,94,249,.2),rgba(190,116,255,.1));
  border:1px solid rgba(124,94,249,.3);
  display:flex;align-items:center;justify-content:center;
  margin-bottom:20px;
  animation:popIn .55s cubic-bezier(.36,.07,.19,.97) both;
  box-shadow:0 0 60px rgba(124,94,249,.25);
  position:relative;
}
.po-icon-wrap::before{
  content:'';position:absolute;inset:-4px;border-radius:50%;
  border:2px solid transparent;
  background:linear-gradient(var(--void),var(--void)) padding-box,
              conic-gradient(from 0deg, var(--iris), var(--plasma), transparent 60%, var(--iris)) border-box;
  animation:ringRotate 3s linear infinite;
}
.po-icon-wrap svg{width:44px;height:44px;stroke:var(--iris3);stroke-width:1.5;fill:none;stroke-linecap:round;filter:drop-shadow(0 0 12px rgba(124,94,249,.7))}
.po-icon-wrap.win svg{stroke:var(--nova);filter:drop-shadow(0 0 12px rgba(247,203,69,.7))}
.po-icon-wrap.win{
  background:linear-gradient(135deg,rgba(247,203,69,.2),rgba(247,203,69,.08));
  border-color:rgba(247,203,69,.3);
  box-shadow:0 0 60px rgba(247,203,69,.25);
}
.po-icon-wrap.win::before{
  background:linear-gradient(var(--void),var(--void)) padding-box,
              conic-gradient(from 0deg, var(--nova), var(--nova2), transparent 60%, var(--nova)) border-box;
}
@keyframes popIn{from{transform:scale(0) rotate(-30deg);opacity:0}60%{transform:scale(1.12) rotate(5deg)}to{transform:scale(1) rotate(0);opacity:1}}

.po-title{
  font-family:'Syne',sans-serif;
  font-size:28px;font-weight:800;text-align:center;margin-bottom:8px;
  animation:fadeUp .4s .12s ease both;
}
.po-amount{
  font-family:'Syne',sans-serif;
  font-size:44px;font-weight:800;color:var(--nova);margin-bottom:8px;
  animation:fadeUp .4s .22s ease both;
  text-shadow:0 0 40px rgba(247,203,69,.4);
}
.po-sub{
  font-size:13px;color:var(--muted3);text-align:center;margin-bottom:30px;
  animation:fadeUp .4s .32s ease both;
  font-family:'Space Grotesk',sans-serif;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.po-actions{
  display:flex;flex-direction:column;gap:9px;width:100%;
  animation:fadeUp .4s .42s ease both;
}

/* ══════════════════════════════════════════════════
   TOAST
══════════════════════════════════════════════════ */
#toast{
  position:fixed;top:14px;left:50%;
  transform:translateX(-50%) translateY(-90px);
  background:var(--surface2);
  border:1px solid var(--border2);
  border-radius:13px;
  padding:10px 16px;
  font-size:13px;font-weight:700;
  z-index:400;
  transition:transform .3s cubic-bezier(.4,0,.2,1);
  white-space:nowrap;
  box-shadow:0 8px 36px rgba(0,0,0,.55);
  display:flex;align-items:center;gap:8px;
  font-family:'Space Grotesk',sans-serif;
  backdrop-filter:blur(16px);
}
#toast.show{transform:translateX(-50%) translateY(0)}
#toast.ok svg{stroke:var(--mint);filter:drop-shadow(0 0 4px rgba(38,232,154,.6))}
#toast.ok{border-color:rgba(38,232,154,.28);color:var(--mint);background:rgba(9,11,26,.9)}
#toast.err svg{stroke:var(--red);filter:drop-shadow(0 0 4px rgba(255,64,96,.6))}
#toast.err{border-color:rgba(255,64,96,.28);color:var(--red);background:rgba(9,11,26,.9)}
#toast svg{width:15px;height:15px;stroke-width:2.5;fill:none;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}

/* UTILS */
.loading-state{display:flex;align-items:center;justify-content:center;padding:52px 20px;gap:12px;color:var(--muted2);font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:600}
.ld-spin{
  width:22px;height:22px;
  border:2px solid rgba(124,94,249,.2);
  border-top-color:var(--iris3);
  border-radius:50%;

}
.empty-state{text-align:center;padding:52px 20px}
.es-icon{margin-bottom:14px}
.es-icon svg{width:48px;height:48px;stroke:var(--muted);stroke-width:1.2;fill:none;stroke-linecap:round}
.es-text{font-size:15px;font-weight:700;color:var(--muted2);margin-bottom:5px;font-family:'Space Grotesk',sans-serif}
.es-sub{font-size:12px;color:var(--muted);font-family:'Space Grotesk',sans-serif}

/* BLOCKED */
.blocked-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center;padding:40px}

/* ══════════════════════════════════════════════════

══════════════════════════════════════════════════ */
.cf{

}
@keyframes cfFall{

  100%{transform:translateY(100vh) rotate(720deg);opacity:0}
}

═══════════════════════════════════════════════════════ */
async function api(path,opts={}){
  const r=await fetch(path,{
    ...opts,
    headers:{'Content-Type':'application/json','X-Telegram-Init-Data':tg?.initData||'',...(opts.headers||{})},
  });
  if(!r.ok) throw new Error('HTTP '+r.status);
  return r.json();
}
const GET=p=>api(p);
const POST=(p,b)=>api(p,{method:'POST',body:JSON.stringify(b)});

  try{
    const d=await GET('/api/user/me');
    if(!d.success){return d.blocked?showBlocked():null;}
    user=d.user;
    applyUser();
    loadPrizes();
  }catch(e){console.error(e);}
}

  const init=(user.first_name||'?')[0].toUpperCase();

  setTxt('prof-name',user.first_name||'—');

  setTxt('pm-gid',user.game_id||'Не указан');
  setTxt('pm-joined',user.created_at||'—');
  setTxt('ps-spins',ss.total||0);
  setTxt('ps-wins',ss.wins||0);
  setTxt('ps-best',(ss.biggest||0)>0?ss.biggest+'₽':'—');
}

function countUp(id,target){
  const el=document.getElementById(id);
  if(!el)return;
  let cur=0;
  const step=Math.max(1,Math.ceil(target/30));
  const t=setInterval(()=>{
    cur=Math.min(cur+step,target);
    el.textContent=cur;
    if(cur>=target)clearInterval(t);
  },20);
}

async function loadRoulettePage(){
  document.getElementById('rt-grid').innerHTML='<div class="loading-state"><div class="ld-spin"></div> Загрузка...</div>';
  try{
    const types=['day','three_days','week','paid'];
    const res=await Promise.allSettled(types.map(t=>GET(`/api/roulette/status?type=${t}`)));
    rStat={};
    types.forEach((t,i)=>{
      rStat[t]=(res[i].status==='fulfilled'&&res[i].value.success)?res[i].value:{cooldown:0,conditions_met:false};
    });
    renderRt();
  }catch(e){
    document.getElementById('rt-grid').innerHTML='<div class="empty-state"><div class="es-text">Ошибка загрузки</div></div>';
  }
}

function renderRt(){
  const el=document.getElementById('rt-grid');
  el.innerHTML=Object.entries(RT_INFO).map(([type,info],idx)=>{
    const st=rStat[type]||{};
    const isSel=selRt===type;
    let badge='',bc='';
    if(type==='paid'){
      const ok=user&&user.balance>=150;
      badge=ok?'Доступна':'Нет средств';
      bc=ok?'sb-ready':'sb-wait';
    }else{
      if(st.cooldown>0){badge=fmtTime(st.cooldown);bc='sb-wait';}
      else if(st.conditions_met){badge='Готово!';bc='sb-ready';}
      else{badge='Условия';bc='sb-cond';}
    }
    return `<div class="rt-card${isSel?' sel':''}" onclick="pickRt('${type}')" style="animation:slideUp .35s ${idx*70}ms ease both">
      <div class="rt-orb"></div>
      <div class="rt-ico ${info.ico}">${RT_SVGS[info.ico]}</div>
      <div class="rt-info">
        <div class="rt-name">${info.name}</div>
        <div class="rt-sub">${info.sub}</div>
      </div>
      <div class="rt-right">
        <div class="status-badge ${bc}"><div class="sb-dot"></div>${badge}</div>
        ${st.cooldown>0?`<div class="rt-timer">Через ${fmtTime(st.cooldown)}</div>`:''}
      </div>
    </div>`;
  }).join('');
}

function pickRt(type){
  selRt=type;cond={sub:false,fwd:false};
  renderRt();
  openRtModal(type);
}

async function chkCond(type){
  const btn=document.getElementById('cond-btn');
  if(btn){btn.disabled=true;btn.textContent='Проверяем...';}
  try{
    const d=await POST('/api/roulette/check-conditions',{type,forwarded:true});
    cond={sub:d.subscribed,fwd:d.forwarded};
    if(d.conditions_met){
      rStat[type]={...(rStat[type]||{}),conditions_met:true};
      closeModal();
      const info=RT_INFO[type];
      const chkSvg=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" width="14" height="14" style="vertical-align:middle;margin-right:4px"><polyline points="20,6 9,17 4,12"/></svg>`;
      showModal(info.name,
        `<p class="modal-info" style="color:var(--mint)">${chkSvg}Все условия выполнены!</p>${prizesHtml(type)}`,
        [{l:'Крутить!',a:`doSpin("${type}")`,c:'btn-primary',id:'spin-btn',
          icon:`<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"/></svg>`},
         {l:'Отмена',a:'closeModal()',c:'btn-secondary'}],
        RT_SVGS[info.ico]);
    }else{
      if(!d.subscribed)toast('Подпишитесь на все каналы','err');
      else toast('Перешлите сообщение друзьям','err');
      showCondModal(type);
    }
  }catch(e){toast('Ошибка соединения','err');}
}

async function doSpin(type){
  const btn=document.getElementById('spin-btn');
  if(btn)btn.disabled=true;
  closeModal();
  showSpinOv();
  try{
    const[d]=await Promise.all([
      POST('/api/roulette/spin',{type}),
      sleep(2200),
    ]);
    hideSpinOv();
    if(!d.success){toast(d.error||'Ошибка прокрута','err');await loadRoulettePage();return;}
    if(d.user)user.balance=d.user.balance;
    renderUserBal();
    await loadRoulettePage();
    showPrize(d.prize,type);
    loadPrizes();
  }catch(e){
    hideSpinOv();
    toast('Ошибка соединения','err');
    await loadRoulettePage();
  }
}

function showPrize(pr,type){
  const nothing=pr.type==='nothing';
  const ov=document.getElementById('prize-overlay');
  const iconWrap=document.getElementById('po-icon');

  document.getElementById('po-badge').textContent=nothing?'Попытка':RT_INFO[type]?.name||'Рулетка';

  // Set icon SVG based on prize type
  let iconSvg;
  if(nothing){
    iconSvg=PRIZE_ICONS.nothing;
    iconWrap.className='po-icon-wrap';
  }else if(pr.type==='balance'){
    iconSvg=PRIZE_ICONS.money;
    iconWrap.className='po-icon-wrap win';
  }else if(pr.type==='account'){
    iconSvg=PRIZE_ICONS.account;
    iconWrap.className='po-icon-wrap win';
  }else{
    iconSvg=PRIZE_ICONS.win;
    iconWrap.className='po-icon-wrap win';
  }
  iconWrap.innerHTML=iconSvg;

  document.getElementById('po-title').textContent=nothing?'Не повезло...':'Поздравляем!';
  document.getElementById('po-amount').textContent=nothing?'':(pr.type==='balance'?'+'+pr.value+'₽':pr.name);
  document.getElementById('po-sub').textContent=nothing?'Попробуйте ещё раз!':pr.type==='balance'?'Зачислено на баланс':'Проверьте раздел «Мои призы»';

  const acts=document.getElementById('po-actions');
  acts.innerHTML='';
  if(!nothing&&(pr.type==='account'||pr.type==='gold')&&pr.prize_id){
    const b=document.createElement('button');
    b.className='btn btn-primary btn-full';
    b.innerHTML=`<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Забрать приз`;
    b.onclick=()=>{closePrize();claimPrize(pr.prize_id,pr.type);};
    acts.appendChild(b);
  }
  const close=document.createElement('button');
  close.className='btn btn-secondary btn-full';
  close.textContent='Закрыть';
  close.onclick=closePrize;
  acts.appendChild(close);

  if(!nothing)spawnConfetti();
  ov.classList.add('on');
}

      const keyIcon=`<svg viewBox="0 0 24 24" fill="none" stroke="var(--nova)" stroke-width="1.8" stroke-linecap="round" width="14" height="14" style="vertical-align:middle;margin-right:4px"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>`;
      const ticketIcon=`<svg viewBox="0 0 24 24" fill="none" stroke="var(--nova)" stroke-width="1.8" stroke-linecap="round" width="14" height="14" style="vertical-align:middle;margin-right:4px"><path d="M15 5v2M15 11v2M15 17v2M5 5h14a2 2 0 0 1 2 2v3a2 2 0 0 0 0 4v3a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-3a2 2 0 0 0 0-4V7a2 2 0 0 1 2-2z"/></svg>`;
      if(dd.email){
        showModal('Аккаунт Tank Blitz',
          `<p class="modal-info">Сохраните данные, смените пароль после входа!</p>
           <div class="modal-code-box">${emailIcon}${dd.email}<br>${keyIcon}${dd.password}</div>`,
          [{l:'Понятно',a:'closeModal()',c:'btn-primary btn-full'}],
          `<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><rect x="2" y="6" width="20" height="12" rx="2"/><path d="M6 12h4M8 10v4"/><circle cx="15" cy="12" r="1"/><circle cx="18" cy="12" r="1"/></svg>`);
      }else if(dd.promo){
        showModal('Промокод на Голду',
          `<p class="modal-info">Введите промокод в игре:</p>
           <div class="modal-code-box">${ticketIcon}${dd.promo}</div>`,
          [{l:'Понятно',a:'closeModal()',c:'btn-primary btn-full'}],
          `<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"/></svg>`);
      }else{
        toast('Приз получен!');
      }
      loadPrizes();
    }else toast(d.error||'Ошибка','err');
  }catch(e){toast('Ошибка соединения','err');}
}

/* ═══════════════════════════════════════════════════════
   NAVIGATION
═══════════════════════════════════════════════════════ */
let curPage='info';
function showPage(name){
  if(name==='roulette'||name!==curPage){
    curPage=name;
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    const pg=document.getElementById('page-'+name);
    if(pg)pg.classList.add('active');
    document.querySelectorAll('.nav-item,.nav-spin').forEach(b=>{
      b.classList.remove('active');
    });
    const navEl=document.getElementById('nav-'+name)||document.getElementById('nav-roulette');
    if(navEl)navEl.classList.add('active');
    if(name==='roulette')loadRoulettePage();
    else if(name==='leaders')loadLeaders();
  }
}

/* ═══════════════════════════════════════════════════════
   MODAL
═══════════════════════════════════════════════════════ */
function showModal(title,body,btns=[],titleIconSvg=null){
  const bg=document.getElementById('modal-bg');
  const titleEl=document.getElementById('modal-title');
  if(titleIconSvg){
    titleEl.innerHTML=`<div class="modal-title-icon">${titleIconSvg}</div>${title}`;
  }else{
    titleEl.textContent=title;
  }
  document.getElementById('modal-body').innerHTML=body;
  const footer=document.getElementById('modal-footer');
  footer.innerHTML='';
  btns.forEach(b=>{
    const el=document.createElement('button');
    el.className='btn '+b.c;
    if(b.id)el.id=b.id;
    el.onclick=new Function(b.a);
    if(b.icon){el.innerHTML=b.icon+b.l;}
    else{el.textContent=b.l;}
    footer.appendChild(el);
  });
  bg.classList.add('open');
}
function closeModal(){document.getElementById('modal-bg').classList.remove('open')}
function closeBg(e){if(e.target===document.getElementById('modal-bg'))closeModal()}

/* ═══════════════════════════════════════════════════════
   PRIZES HTML HELPER
═══════════════════════════════════════════════════════ */
function prizesHtml(type){
  const cfg=PRIZES_CFG[type]||[];
  if(!cfg.length)return'';
  const rows=cfg.map(p=>`<div>
    <div class="pt-dot"></div>
    <span class="pt-name">${p.n}</span>
    <span class="pt-pct">${p.c}%</span>
  </div>`).join('');
  return`<div class="prizes-text">${rows}</div>`;
}

/* ═══════════════════════════════════════════════════════
   CONFETTI
═══════════════════════════════════════════════════════ */
function spawnConfetti(){
  const field=document.getElementById('confetti-field');
  const colors=['#7c5ef9','#be74ff','#f7cb45','#26e89a','#00e5ff','#ff4060','#fff'];
  for(let i=0;i<70;i++){
    const el=document.createElement('div');
    el.className='cf';
    const x=Math.random()*100;
    const size=Math.random()*10+5;
    const dur=Math.random()*2+1.5;
    const del=Math.random()*1.2;
    const color=colors[Math.floor(Math.random()*colors.length)];
    el.style.cssText=`left:${x}%;width:${size}px;height:${size*(Math.random()>.5?.4:1)}px;background:${color};border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${dur}s;animation-delay:${del}s;transform-origin:center;`;
    field.appendChild(el);
    setTimeout(()=>el.remove(),(dur+del)*1000+200);
  }
}

/* ═══════════════════════════════════════════════════════
   TOAST
═══════════════════════════════════════════════════════ */
let toastTimer=null;
function toast(msg,type='ok'){
  const t=document.getElementById('toast');
  const icon=document.getElementById('toast-icon');
  const text=document.getElementById('toast-text');
  t.className=type==='err'?'err':'ok';
  if(type==='err'){
    icon.innerHTML='<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>';
  }else{
    icon.innerHTML='<polyline points="20,6 9,17 4,12"/>';
  }
  text.textContent=msg;
  t.classList.add('show');
  if(toastTimer)clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),2600);
}

═══════════════════════════════════════════════════════ */
function setTxt(id,v){const e=document.getElementById(id);if(e)e.textContent=v}
function sleep(ms){return new Promise(r=>setTimeout(r,ms))}
function fmtTime(s){
  const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;
  if(h>0)return`${h}ч ${m}м`;
  if(m>0)return`${m}м ${sec}с`;
  return`${sec}с`;
}
